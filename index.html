<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bramls | NFT Обмен</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --border-active: #555555;
      --text: #ffffff;
      --text-secondary: #aaaaaa;
      --text-tertiary: #777777;
      --accent: #ffffff;
      --accent-dim: #888888;
      --danger: #ff4444;
      --success: #00cc66;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
    }

    .splash-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    .splash-content { text-align: center; }
    .splash-logo {
      width: 80px; height: 80px; margin: 0 auto 20px;
      background: var(--surface2); border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; border: 1px solid var(--border);
    }
    .splash-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    .splash-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

    .container { max-width: 480px; margin: 0 auto; padding: 16px 16px 100px; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--text-secondary); font-weight: 400; }

    /* Profile */
    .profile-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px; text-align: center;
    }
    .profile-avatar {
      width: 56px; height: 56px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      margin: 0 auto 12px; border: 1px solid var(--border);
    }
    .profile-name { font-size: 16px; font-weight: 600; }
    .profile-username { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Filters */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; }
    .filter-btn {
      flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 13px; cursor: pointer;
      text-align: center; transition: 0.15s;
    }
    .filter-btn:active { background: var(--surface2); }

    .filter-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px; display: none;
    }
    .filter-panel.active { display: block; }

    .filter-row { margin-bottom: 12px; }
    .filter-label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 6px; text-transform: uppercase; }
    select, input {
      width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 13px; outline: none;
    }
    select:focus, input:focus { border-color: var(--border-active); }

    .btn {
      width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; text-align: center; transition: 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-white { background: var(--text); color: var(--bg); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: var(--surface); border-radius: var(--radius); padding: 4px; border: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 500;
      border-radius: 12px; cursor: pointer; color: var(--text-secondary); transition: 0.15s;
    }
    .tab.active { background: var(--surface2); color: var(--text); }

    /* Grid */
    .gifts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

    .gift-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; cursor: pointer; transition: 0.15s; text-align: center;
    }
    .gift-card:active { border-color: var(--border-active); }

    .gift-image {
      width: 100%; aspect-ratio: 1; border-radius: var(--radius-sm);
      background: var(--surface2); display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px; font-size: 48px; border: 1px solid var(--border);
    }
    .gift-image img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }

    .gift-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .gift-number { font-size: 11px; color: var(--text-tertiary); }
    .gift-chars { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-top: 6px; }
    .char-tag {
      font-size: 10px; padding: 2px 8px; border-radius: 20px;
      background: var(--surface2); color: var(--text-secondary); border: 1px solid var(--border);
    }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); grid-column: span 2; }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; padding: 20px;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 16px; }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-image { width: 120px; height: 120px; font-size: 64px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; background: var(--surface2); border-radius: var(--radius-sm); }
    .modal-image img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .detail-label { color: var(--text-secondary); }
    .detail-value { font-weight: 500; text-align: right; max-width: 60%; }

    /* Exchange */
    .exchange-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
    .exchange-pair { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .exchange-slot {
      flex: 1; padding: 14px; background: var(--surface2); border: 1px dashed var(--border);
      border-radius: var(--radius-sm); text-align: center; cursor: pointer; min-height: 60px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .exchange-slot.selected { border-color: var(--accent-dim); border-style: solid; }
    .exchange-arrow { font-size: 20px; color: var(--text-secondary); }
    .exchange-slot-name { font-size: 13px; font-weight: 600; }
    .exchange-slot-detail { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .fee-info { font-size: 12px; color: var(--text-secondary); text-align: center; margin-bottom: 12px; }

    .order-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; margin-bottom: 10px;
    }
    .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: var(--text-secondary); }
    .order-items { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .order-item {
      flex: 1; text-align: center; padding: 10px; background: var(--surface2);
      border-radius: var(--radius-sm); font-size: 12px;
    }
    .order-item-name { font-weight: 600; }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
      border-top: 1px solid var(--border); padding: 8px 16px 16px; z-index: 100;
    }
    .nav-inner { display: flex; justify-content: space-around; max-width: 480px; margin: 0 auto; }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; color: var(--text-secondary); font-size: 11px; padding: 6px 16px;
      border-radius: 20px; transition: 0.15s;
    }
    .nav-item.active { color: var(--text); background: var(--surface2); }

    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--surface); color: var(--text); padding: 12px 24px;
      border-radius: 30px; font-size: 13px; z-index: 2000; border: 1px solid var(--border);
      white-space: nowrap;
    }

    .loading { text-align: center; padding: 40px; color: var(--text-secondary); grid-column: span 2; }
  </style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
  <div class="splash-content">
    <div class="splash-logo">◈</div>
    <div class="splash-title">Bramls</div>
    <div class="splash-subtitle">NFT Marketplace</div>
  </div>
</div>

<div class="container" style="display:none" id="appContainer">

  <div class="header">
    <div class="logo">Bramls <span>NFT</span></div>
  </div>

  <div class="profile-card" id="profileCard">
    <div class="profile-avatar" id="profileAvatar">◈</div>
    <div class="profile-name" id="profileName">—</div>
    <div class="profile-username" id="profileUsername">—</div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="statGifts">0</div><div class="stat-label">NFT в базе</div></div>
    <div class="stat-card"><div class="stat-value" id="statInventory">0</div><div class="stat-label">В инвентаре</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn" id="collectionToggleBtn">Коллекции</button>
    <button class="filter-btn" id="filterToggleBtn">Фильтры</button>
  </div>

  <div class="filter-panel" id="collectionPanel">
    <div class="filter-row">
      <label class="filter-label">Коллекция</label>
      <select id="collectionSelect"><option value="">Все коллекции</option></select>
    </div>
    <button class="btn btn-white" id="applyCollectionBtn" style="margin-top:8px">Применить</button>
  </div>

  <div class="filter-panel" id="filterPanel">
    <div class="filter-row"><label class="filter-label">Название</label><input type="text" id="filterName" placeholder="Heart Locket..."></div>
    <div class="filter-row"><label class="filter-label">Модель</label><input type="text" id="filterModel" placeholder="Ramune..."></div>
    <div class="filter-row"><label class="filter-label">Фон</label><input type="text" id="filterBackground" placeholder="Onyx Black..."></div>
    <div class="filter-row"><label class="filter-label">Узор</label><input type="text" id="filterPattern" placeholder="Illuminati..."></div>
    <button class="btn btn-white" id="applyFiltersBtn" style="margin-top:8px">Применить</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="market">Маркет</div>
    <div class="tab" data-tab="inventory">Инвентарь</div>
    <div class="tab" data-tab="exchange">Обмен</div>
  </div>

  <div id="marketTab"><div class="gifts-grid" id="giftsGrid"><div class="loading">Загрузка...</div></div></div>
  <div id="inventoryTab" style="display:none"><div class="gifts-grid" id="inventoryGrid"><div class="loading">Загрузка...</div></div></div>
  <div id="exchangeTab" style="display:none">
    <div class="exchange-box">
      <div class="exchange-pair">
        <div class="exchange-slot" id="offerSlot" onclick="openSelector('offer')">
          <div class="exchange-slot-name" id="offerName">Ваш NFT</div>
          <div class="exchange-slot-detail" id="offerDetail">Нажмите чтобы выбрать</div>
        </div>
        <div class="exchange-arrow">→</div>
        <div class="exchange-slot" id="wantSlot" onclick="openSelector('want')">
          <div class="exchange-slot-name" id="wantName">Желаемый NFT</div>
          <div class="exchange-slot-detail" id="wantDetail">Нажмите чтобы выбрать</div>
        </div>
      </div>
      <div class="fee-info">Комиссия: 0.1 TON</div>
      <button class="btn btn-white" id="createOrderBtn">Создать заявку</button>
    </div>
    <div class="tabs" style="margin-top:8px">
      <div class="tab active" data-ex-tab="open">Открытые</div>
      <div class="tab" data-ex-tab="my">Мои</div>
    </div>
    <div id="ordersList"></div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-inner">
    <div class="nav-item active" data-page="market">Маркет</div>
    <div class="nav-item" data-page="inventory">Инвентарь</div>
    <div class="nav-item" data-page="exchange">Обмен</div>
  </div>
</nav>

<div class="modal-overlay" id="giftModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="giftModalTitle">NFT</div>
      <button class="modal-close" onclick="closeModal('giftModal')">✕</button>
    </div>
    <div class="modal-image" id="giftModalImage">◈</div>
    <div id="giftModalDetails"></div>
    <button class="btn btn-outline" onclick="closeModal('giftModal')" style="margin-top:16px">Закрыть</button>
  </div>
</div>

<div class="modal-overlay" id="selectorModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="selectorTitle">Выбор NFT</div>
      <button class="modal-close" onclick="closeModal('selectorModal')">✕</button>
    </div>
    <div class="gifts-grid" id="selectorGrid"></div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  let userId = tg.initDataUnsafe?.user?.id || null;
  let allGifts = [], inventory = [], collections = [];
  let openOrders = [], myOrders = [];
  let offerGift = null, wantGift = null;
  let currentExTab = 'open';

  setTimeout(() => {
    document.getElementById('splashScreen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splashScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
    }, 400);
  }, 1200);

  // API
  async function api(action, data = {}) {
    try {
      const r = await fetch('/api', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action, data, userId})
      });
      return await r.json();
    } catch(e) { return {success:false, error:'Connection error'}; }
  }

  // Loaders
  async function init() {
    const [profile, col, gifts, inv, orders] = await Promise.all([
      api('get_user_profile'),
      api('get_collections'),
      api('filter_gifts'),
      api('get_inventory'),
      api('get_orders')
    ]);
    if (profile.success && profile.user) {
      document.getElementById('profileName').textContent = profile.user.firstName || 'User';
      document.getElementById('profileUsername').textContent = profile.user.telegramUsername ? '@'+profile.user.telegramUsername : '';
    }
    if (col.success) {
      collections = col.collections || [];
      const sel = document.getElementById('collectionSelect');
      sel.innerHTML = '<option value="">Все коллекции</option>' + collections.map(c => `<option value="${c.id}">${c.name} (${c.totalFound})</option>`).join('');
    }
    if (gifts.success) { allGifts = gifts.gifts || []; renderMarket(); }
    document.getElementById('statGifts').textContent = gifts.total || 0;
    if (inv.success) { inventory = inv.inventory || []; renderInventory(); }
    document.getElementById('statInventory').textContent = inv.total || 0;
    if (orders.success) { openOrders = orders.openOrders || []; myOrders = orders.myOrders || []; renderOrders(); }
  }

  // Render market
  function renderMarket() {
    const c = document.getElementById('giftsGrid');
    if (!allGifts.length) {
      c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">◈</div><div>Нет NFT в базе</div><div style="font-size:11px;margin-top:4px;color:var(--text-tertiary)">Парсер собирает данные...</div></div>';
      return;
    }
    c.innerHTML = allGifts.map(g => `
      <div class="gift-card" onclick="openGiftModal(${g.id})">
        <div class="gift-image"><img src="${g.previewUrl || g.imageUrl}" onerror="this.parentElement.innerHTML='◈'" alt="${g.name}"></div>
        <div class="gift-name">${esc(g.name)}</div>
        <div class="gift-number">#${g.giftId}</div>
        <div class="gift-chars">
          ${g.model ? `<span class="char-tag">${esc(g.model)}</span>` : ''}
          ${g.background ? `<span class="char-tag">${esc(g.background)}</span>` : ''}
          ${g.pattern ? `<span class="char-tag">${esc(g.pattern)}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // Render inventory
  function renderInventory() {
    const c = document.getElementById('inventoryGrid');
    if (!inventory.length) {
      c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📦</div><div>Инвентарь пуст</div></div>';
      return;
    }
    c.innerHTML = inventory.map(i => `
      <div class="gift-card" onclick="openGiftModal(${i.nftId})">
        <div class="gift-image"><img src="${i.imageUrl}" onerror="this.parentElement.innerHTML='◈'"></div>
        <div class="gift-name">${esc(i.name)}</div>
        <div class="gift-chars">
          ${i.model ? `<span class="char-tag">${esc(i.model)}</span>` : ''}
          ${i.background ? `<span class="char-tag">${esc(i.background)}</span>` : ''}
          ${i.pattern ? `<span class="char-tag">${esc(i.pattern)}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // Gift modal
  function openGiftModal(id) {
    const gift = allGifts.find(g => g.id === id) || inventory.find(i => i.nftId === id);
    if (!gift) return;
    document.getElementById('giftModalTitle').textContent = `${gift.name} #${gift.giftId || ''}`;
    document.getElementById('giftModalImage').innerHTML = `<img src="${gift.previewUrl || gift.imageUrl}" onerror="this.innerHTML='◈'" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
    let details = '';
    if (gift.model) details += `<div class="detail-row"><span class="detail-label">Модель</span><span class="detail-value">${esc(gift.model)}${gift.modelPercent ? ` (${gift.modelPercent}%)` : ''}</span></div>`;
    if (gift.background) details += `<div class="detail-row"><span class="detail-label">Фон</span><span class="detail-value">${esc(gift.background)}${gift.backgroundPercent ? ` (${gift.backgroundPercent}%)` : ''}</span></div>`;
    if (gift.pattern) details += `<div class="detail-row"><span class="detail-label">Узор</span><span class="detail-value">${esc(gift.pattern)}${gift.patternPercent ? ` (${gift.patternPercent}%)` : ''}</span></div>`;
    if (gift.owner) details += `<div class="detail-row"><span class="detail-label">Владелец</span><span class="detail-value">${esc(gift.owner)}</span></div>`;
    if (gift.issuedCount) details += `<div class="detail-row"><span class="detail-label">Выпущено</span><span class="detail-value">${gift.issuedCount} / ${gift.totalCount}</span></div>`;
    document.getElementById('giftModalDetails').innerHTML = details || '<div class="detail-row">Нет данных</div>';
    openModal('giftModal');
  }

  // Selector
  function openSelector(type) {
    document.getElementById('selectorTitle').textContent = type === 'offer' ? 'Ваш NFT (из инвентаря)' : 'Желаемый NFT (из маркета)';
    const items = type === 'offer' ? inventory : allGifts;
    const grid = document.getElementById('selectorGrid');
    if (!items.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:span 2">Нет доступных NFT</div>';
    } else {
      grid.innerHTML = items.slice(0, 60).map(i => `
        <div class="gift-card" onclick="selectGift('${type}', ${type==='offer' ? i.nftId : i.id})">
          <div class="gift-image"><img src="${i.previewUrl || i.imageUrl}" onerror="this.parentElement.innerHTML='◈'"></div>
          <div class="gift-name">${esc(i.name)}</div>
          <div class="gift-number">#${i.giftId || ''}</div>
        </div>
      `).join('');
    }
    window._selectorType = type;
    openModal('selectorModal');
  }

  function selectGift(type, id) {
    const gift = type === 'offer' ? inventory.find(i => i.nftId === id) : allGifts.find(g => g.id === id);
    if (!gift) return;
    if (type === 'offer') {
      offerGift = gift;
      document.getElementById('offerName').textContent = gift.name;
      document.getElementById('offerDetail').textContent = [gift.model, gift.background, gift.pattern].filter(Boolean).join(' / ') || '—';
      document.getElementById('offerSlot').classList.add('selected');
    } else {
      wantGift = gift;
      document.getElementById('wantName').textContent = `${gift.name} #${gift.giftId}`;
      document.getElementById('wantDetail').textContent = [gift.model, gift.background, gift.pattern].filter(Boolean).join(' / ') || '—';
      document.getElementById('wantSlot').classList.add('selected');
    }
    closeModal('selectorModal');
  }

  // Orders
  async function createOrder() {
    if (!offerGift || !wantGift) return toast('Выберите оба NFT');
    const r = await api('create_exchange', {offerId: offerGift.nftId, wantId: wantGift.id});
    if (r.success) {
      toast('Заявка создана');
      offerGift = wantGift = null;
      document.getElementById('offerName').textContent = 'Ваш NFT';
      document.getElementById('offerDetail').textContent = 'Нажмите чтобы выбрать';
      document.getElementById('wantName').textContent = 'Желаемый NFT';
      document.getElementById('wantDetail').textContent = 'Нажмите чтобы выбрать';
      document.getElementById('offerSlot').classList.remove('selected');
      document.getElementById('wantSlot').classList.remove('selected');
      await refreshExchange();
    } else toast(r.error || 'Ошибка');
  }

  async function acceptOrder(id) {
    const r = await api('accept_exchange', {orderId: id});
    if (r.success) { toast('Обмен выполнен'); await refreshExchange(); await refreshInventory(); }
    else toast(r.error || 'Ошибка');
  }

  function renderOrders() {
    const orders = currentExTab === 'open' ? openOrders : myOrders;
    const c = document.getElementById('ordersList');
    if (!orders.length) {
      c.innerHTML = '<div class="empty-state" style="grid-column:span 1"><div>Нет заявок</div></div>';
      return;
    }
    c.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="order-header"><span>${esc(o.userName)}</span><span>${o.status}</span></div>
        <div class="order-items">
          <div class="order-item"><div class="order-item-name">${esc(o.offerGiftName)}</div><div style="font-size:10px;color:var(--text-tertiary)">${[o.offerModel,o.offerBackground,o.offerPattern].filter(Boolean).join(' / ')||''}</div></div>
          <div>→</div>
          <div class="order-item"><div class="order-item-name">${esc(o.wantGiftName)}</div></div>
        </div>
        ${currentExTab === 'open' && o.userId !== userId ? `<button class="btn btn-white" onclick="acceptOrder(${o.id})" style="margin-top:8px">Принять (0.1 TON)</button>` : ''}
      </div>
    `).join('');
  }

  async function refreshExchange() {
    const r = await api('get_orders');
    if (r.success) { openOrders = r.openOrders || []; myOrders = r.myOrders || []; renderOrders(); }
  }
  async function refreshInventory() {
    const r = await api('get_inventory');
    if (r.success) { inventory = r.inventory || []; renderInventory(); document.getElementById('statInventory').textContent = r.total || 0; }
  }

  // Filters
  async function applyFilters() {
    const filters = {
      collectionId: document.getElementById('collectionSelect').value || null,
      giftName: document.getElementById('filterName').value || null,
      model: document.getElementById('filterModel').value || null,
      background: document.getElementById('filterBackground').value || null,
      pattern: document.getElementById('filterPattern').value || null
    };
    const r = await api('filter_gifts', filters);
    if (r.success) { allGifts = r.gifts || []; renderMarket(); }
    document.getElementById('collectionPanel').classList.remove('active');
    document.getElementById('filterPanel').classList.remove('active');
  }

  // UI helpers
  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function toast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
  }
  function esc(s) { return String(s||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

  // Tab switching
  function switchTab(tab) {
    document.getElementById('marketTab').style.display = tab === 'market' ? 'block' : 'none';
    document.getElementById('inventoryTab').style.display = tab === 'inventory' ? 'block' : 'none';
    document.getElementById('exchangeTab').style.display = tab === 'exchange' ? 'block' : 'none';
    document.querySelectorAll('.tab[data-tab]').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === tab));
    if (tab === 'exchange') refreshExchange();
    if (tab === 'inventory') refreshInventory();
  }

  // Event bindings
  document.getElementById('filterToggleBtn').onclick = () => {
    document.getElementById('filterPanel').classList.toggle('active');
    document.getElementById('collectionPanel').classList.remove('active');
  };
  document.getElementById('collectionToggleBtn').onclick = () => {
    document.getElementById('collectionPanel').classList.toggle('active');
    document.getElementById('filterPanel').classList.remove('active');
  };
  document.getElementById('applyFiltersBtn').onclick = applyFilters;
  document.getElementById('applyCollectionBtn').onclick = applyFilters;
  document.getElementById('createOrderBtn').onclick = createOrder;
  document.querySelectorAll('.tab[data-tab]').forEach(t => t.onclick = () => switchTab(t.dataset.tab));
  document.querySelectorAll('.nav-item').forEach(n => n.onclick = () => switchTab(n.dataset.page));
  document.querySelectorAll('.tab[data-ex-tab]').forEach(t => t.onclick = () => {
    currentExTab = t.dataset.exTab;
    document.querySelectorAll('.tab[data-ex-tab]').forEach(el => el.classList.toggle('active', el.dataset.exTab === currentExTab));
    renderOrders();
  });

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bramls | NFT Marketplace</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@2.4.1/dist/tonconnect-ui.min.js"></script>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0c15;
            --bg-secondary: #11141f;
            --card-bg: rgba(22, 26, 40, 0.95);
            --accent: #5e7aff;
            --accent-glow: rgba(94, 122, 255, 0.4);
            --gold: #ffd966;
            --green: #34d87a;
            --red: #ff5e5e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px 16px 80px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 12px 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .wallet-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .wallet-btn:active {
            transform: scale(0.96);
        }

        .wallet-icon {
            width: 20px;
            height: 20px;
        }

        .wallet-address {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(135deg, rgba(94, 122, 255, 0.2), rgba(94, 122, 255, 0.05));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, var(--accent), #4a6bd4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .telegram-handle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, rgba(94, 122, 255, 0.15), rgba(94, 122, 255, 0.05));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .balance-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .balance-value {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 16px;
        }

        .balance-value .amount {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .balance-value .currency {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .balance-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #4a6bd4);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        /* Filter Bar */
        .filter-bar {
            margin-bottom: 16px;
            display: flex;
            justify-content: flex-end;
        }

        .filter-toggle {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-primary);
        }

        .filter-panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid var(--border);
        }

        .filter-panel.active {
            display: block;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 13px;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-checkbox input {
            width: auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--card-bg);
            border-radius: 40px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            border-radius: 36px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .tab.active {
            background: var(--accent);
            color: white;
        }

        /* Grids */
        .gifts-grid, .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .gift-card, .inventory-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .gift-card:active, .inventory-item:active {
            transform: scale(0.98);
        }

        .gift-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(94, 122, 255, 0.2);
        }

        .gift-visual, .inv-item-visual {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 48px;
            transition: transform 0.3s ease;
        }

        .gift-card:hover .gift-visual {
            transform: scale(1.05);
        }

        .gift-name, .inv-item-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .gift-price {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
        }

        .rarity-badge {
            font-size: 11px;
            margin-top: 4px;
        }

        .rarity-common { color: #9ca3af; }
        .rarity-rare { color: #3b82f6; }
        .rarity-epic { color: #a855f7; }
        .rarity-legendary { color: #f59e0b; }

        .inventory-item .sell-badge {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            padding: 24px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-gift-image {
            width: 80px;
            height: 80px;
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        .modal-price {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        /* Exchange Orders */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-user {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .order-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(52, 216, 122, 0.2);
            color: var(--green);
        }

        .order-items {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .order-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .order-item-name {
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
        }

        .order-arrow {
            font-size: 20px;
            color: var(--accent);
        }

        .order-actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            border-radius: 20px;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            z-index: 100;
        }

        .nav-inner {
            display: flex;
            justify-content: space-around;
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 11px;
            transition: all 0.2s;
            padding: 8px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 2000;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
    </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">🎁 Bramls</div>
    <div class="wallet-btn" id="walletBtn">
      <span class="wallet-icon">💎</span>
      <span class="wallet-address" id="walletAddress">Connect Wallet</span>
    </div>
  </div>

  <!-- Profile Card -->
  <div class="profile-card" id="profileCard" style="display: none;">
    <div class="avatar" id="userAvatar">
      <span>👤</span>
    </div>
    <div class="username" id="userName">User Name</div>
    <div class="telegram-handle" id="userHandle">@username</div>
    <div class="balance-value" style="justify-content: center;">
      <span class="amount" id="userBalance">0.00</span>
      <span class="currency">TON</span>
    </div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="totalGifts">0</div>
        <div class="stat-label">Gifts</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="collectionValue">0</div>
        <div class="stat-label">Value</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="completionRate">0%</div>
        <div class="stat-label">Completion</div>
      </div>
    </div>
  </div>

  <!-- Balance Card -->
  <div class="balance-card">
    <div class="balance-label">TON Balance</div>
    <div class="balance-value">
      <span class="amount" id="tonBalance">0.00</span>
      <span class="currency">TON</span>
    </div>
    <div class="balance-actions">
      <button class="btn btn-primary" id="depositBtn">💎 Deposit</button>
      <button class="btn btn-secondary" id="withdrawBtn">💸 Withdraw</button>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-toggle" onclick="toggleFilters()">🔍 Filter Gifts</button>
  </div>

  <!-- Filter Panel -->
  <div class="filter-panel" id="filterPanel">
    <div class="filter-group">
      <label>Gift Type</label>
      <select id="filterType">
        <option value="">All Types</option>
        <option value="Plush Pepe">Plush Pepe</option>
        <option value="Kissed Frog">Kissed Frog</option>
        <option value="Crypto Bear">Crypto Bear</option>
        <option value="TON Rocket">TON Rocket</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Model</label>
      <select id="filterModel">
        <option value="">All Models</option>
        <option value="2.6% Ramune">2.6% Ramune</option>
        <option value="Cherry Blossom">Cherry Blossom</option>
        <option value="Neon Pulse">Neon Pulse</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Background</label>
      <select id="filterBackground">
        <option value="">All Backgrounds</option>
        <option value="English Violet">English Violet</option>
        <option value="Midnight Blue">Midnight Blue</option>
        <option value="Forest Green">Forest Green</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Pattern</label>
      <select id="filterPattern">
        <option value="">All Patterns</option>
        <option value="Treats">Treats</option>
        <option value="Stars">Stars</option>
        <option value="Hearts">Hearts</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Rarity</label>
      <select id="filterRarity">
        <option value="">All Rarities</option>
        <option value="Common">Common</option>
        <option value="Rare">Rare</option>
        <option value="Epic">Epic</option>
        <option value="Legendary">Legendary</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Price Range (TON)</label>
      <div style="display: flex; gap: 8px;">
        <input type="number" id="filterMinPrice" placeholder="Min" step="0.1">
        <input type="number" id="filterMaxPrice" placeholder="Max" step="0.1">
      </div>
    </div>
    <div class="filter-group filter-checkbox">
      <input type="checkbox" id="filterListed">
      <label>Only listed for sale</label>
    </div>
    <button class="btn btn-primary" onclick="applyFilters()" style="margin-top: 12px;">Apply Filters</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="market">🎁 Market</div>
    <div class="tab" data-tab="inventory">📦 Inventory</div>
    <div class="tab" data-tab="exchange">🔄 Exchange</div>
  </div>

  <!-- Market Tab -->
  <div id="marketTab">
    <div id="giftsGrid" class="gifts-grid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>Loading gifts...</div>
      </div>
    </div>
  </div>

  <!-- Inventory Tab -->
  <div id="inventoryTab" style="display: none;">
    <div id="inventoryGrid" class="inventory-grid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>Loading inventory...</div>
      </div>
    </div>
  </div>

  <!-- Exchange Tab -->
  <div id="exchangeTab" style="display: none;">
    <button class="btn btn-primary" id="createOrderBtn" style="margin-bottom: 16px;">+ Create Exchange Order</button>
    <div id="ordersList" class="orders-list">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>Loading orders...</div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <div class="nav-inner">
    <div class="nav-item active" data-page="main">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </div>
    <div class="nav-item" data-page="market">
      <span class="nav-icon">🎁</span>
      <span>Market</span>
    </div>
    <div class="nav-item" data-page="inventory">
      <span class="nav-icon">📦</span>
      <span>Inventory</span>
    </div>
    <div class="nav-item" data-page="exchange">
      <span class="nav-icon">🔄</span>
      <span>Exchange</span>
    </div>
  </div>
</nav>

<!-- Buy Modal -->
<div class="modal-overlay" id="buyModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('buyModal')">✕</button>
    <div class="modal-title" id="buyModalTitle">Buy Gift</div>
    <div class="modal-gift-image" id="buyModalImage">🎁</div>
    <div class="modal-price" id="buyModalPrice"></div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeModal('buyModal')">Cancel</button>
      <button class="btn btn-primary" id="confirmBuyBtn">Confirm Purchase</button>
    </div>
  </div>
</div>

<!-- Sell Modal -->
<div class="modal-overlay" id="sellModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('sellModal')">✕</button>
    <div class="modal-title">Sell Gift</div>
    <div class="modal-gift-image" id="sellModalImage">🎁</div>
    <div class="modal-price" id="sellModalPrice"></div>
    <div class="form-group">
      <label class="form-label">Sell Price (TON)</label>
      <input type="number" id="sellPrice" placeholder="Enter price" step="0.1" min="0.1">
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeModal('sellModal')">Cancel</button>
      <button class="btn btn-primary" id="confirmSellBtn">List for Sale</button>
    </div>
  </div>
</div>

<!-- Create Exchange Order Modal -->
<div class="modal-overlay" id="exchangeModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('exchangeModal')">✕</button>
    <div class="modal-title">Create Exchange Order</div>
    <div class="form-group">
      <label class="form-label">Your Gift</label>
      <select id="offerGiftSelect"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Want to receive</label>
      <select id="wantGiftSelect"></select>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeModal('exchangeModal')">Cancel</button>
      <button class="btn btn-primary" id="confirmExchangeBtn">Create Order</button>
    </div>
  </div>
</div>

<!-- Deposit/Withdraw Modal -->
<div class="modal-overlay" id="tonModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('tonModal')">✕</button>
    <div class="modal-title" id="tonModalTitle">Deposit TON</div>
    <div class="form-group">
      <label class="form-label">Amount (TON)</label>
      <input type="number" id="tonAmount" placeholder="0.00" step="0.1" min="0.1">
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeModal('tonModal')">Cancel</button>
      <button class="btn btn-primary" id="confirmTonBtn">Confirm</button>
    </div>
  </div>
</div>

<script>
    // Telegram WebApp initialization
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();

    let tonConnectUI = null;
    let currentUser = null;
    let currentUserId = null;
    let giftsData = [];
    let inventoryData = [];
    let ordersData = [];
    let currentTab = 'market';

    // Get Telegram user data
    const initData = tg.initDataUnsafe;
    if (initData && initData.user) {
        currentUserId = initData.user.id;
    }

    // Send data to bot
    async function sendToBot(action, data) {
        const payload = {
            action: action,
            data: data,
            userId: currentUserId
        };

        return new Promise((resolve) => {
            tg.sendData(JSON.stringify(payload));
            // In real implementation, you'd wait for response
            resolve({ success: true });
        });
    }

    // Load user profile
    async function loadUserProfile() {
        try {
            const response = await fetch(`/api/user/${currentUserId}`);
            const data = await response.json();
            if (data.success) {
                currentUser = data.user;
                updateProfileUI();
                document.getElementById('tonBalance').textContent = currentUser.balance.toFixed(2);
            }
        } catch (e) {
            console.error('Profile load error:', e);
            // Mock user for demo
            currentUser = { id: currentUserId, firstName: initData?.user?.first_name || 'User', username: initData?.user?.username || 'user', balance: 10.0, collectionStats: { totalGifts: 0, totalValue: 0, completionRate: 0 } };
            updateProfileUI();
        }
    }

    function updateProfileUI() {
        if (!currentUser) return;

        document.getElementById('userName').textContent = currentUser.firstName;
        document.getElementById('userHandle').textContent = '@' + (currentUser.telegramUsername || currentUser.username);
        document.getElementById('userBalance').textContent = currentUser.balance.toFixed(2);
        document.getElementById('totalGifts').textContent = currentUser.collectionStats?.totalGifts || 0;
        document.getElementById('collectionValue').textContent = (currentUser.collectionStats?.totalValue || 0).toFixed(1);
        document.getElementById('completionRate').textContent = Math.round(currentUser.collectionStats?.completionRate || 0);

        if (currentUser.avatarUrl) {
            document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.avatarUrl}" alt="avatar">`;
        }

        document.getElementById('profileCard').style.display = 'block';
    }

    // Filter functions
    function toggleFilters() {
        document.getElementById('filterPanel').classList.toggle('active');
    }

    async function applyFilters() {
        const filters = {
            type: document.getElementById('filterType').value || null,
            model: document.getElementById('filterModel').value || null,
            background: document.getElementById('filterBackground').value || null,
            pattern: document.getElementById('filterPattern').value || null,
            rarity: document.getElementById('filterRarity').value || null,
            minPrice: parseFloat(document.getElementById('filterMinPrice').value) || null,
            maxPrice: parseFloat(document.getElementById('filterMaxPrice').value) || null,
            onlyListed: document.getElementById('filterListed').checked
        };

        await loadGiftsWithFilters(filters);
    }

    async function loadGiftsWithFilters(filters) {
        try {
            const response = await fetch('/api/gifts/filter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(filters)
            });
            const data = await response.json();
            if (data.success) {
                giftsData = data.gifts;
                renderGifts();
            }
        } catch (e) {
            console.error('Filter error:', e);
            // Mock gifts data
            giftsData = [
                { id: 1, name: "Plush Pepe", type: "Plush Pepe", model: "2.6% Ramune", background: "English Violet", pattern: "Treats", image: "🐸", price: 5.0, rarity: "Rare" },
                { id: 2, name: "Kissed Frog", type: "Kissed Frog", model: "Cherry Blossom", background: "Midnight Blue", pattern: "Stars", image: "🐸💋", price: 15.0, rarity: "Epic" }
            ];
            renderGifts();
        }
    }

    function renderGifts() {
        const container = document.getElementById('giftsGrid');
        if (!giftsData.length) {
            container.innerHTML = '<div class="empty-state">No gifts available</div>';
            return;
        }
        container.innerHTML = giftsData.map(gift => `
            <div class="gift-card" onclick="openBuyModal('${gift.id}')">
                <div class="gift-visual">${gift.image || '🎁'}</div>
                <div class="gift-name">${escapeHtml(gift.name)}</div>
                <div class="gift-price">💰 ${gift.price} TON</div>
                <div class="rarity-badge rarity-${gift.rarity?.toLowerCase() || 'common'}">${gift.rarity || 'Common'}</div>
                <div style="font-size: 10px; color: var(--text-secondary);">${gift.model || ''} · ${gift.background || ''}</div>
            </div>
        `).join('');
    }

    async function loadGifts() {
        await loadGiftsWithFilters({});
    }

    async function loadInventory() {
        if (!currentUser) return;
        try {
            const response = await fetch(`/api/inventory/${currentUser.id}`);
            const data = await response.json();
            if (data.success) {
                inventoryData = data.inventory;
                renderInventory();
            }
        } catch (e) {
            console.error('Inventory error:', e);
            inventoryData = [];
            renderInventory();
        }
    }

    function renderInventory() {
        const container = document.getElementById('inventoryGrid');
        if (!inventoryData.length) {
            container.innerHTML = '<div class="empty-state">📦 Your inventory is empty<br>Buy some gifts in the Market!</div>';
            return;
        }
        container.innerHTML = inventoryData.map(item => `
            <div class="inventory-item" onclick="openSellModal('${item.id}')">
                <div class="inv-item-visual">${item.image || '🎁'}</div>
                <div class="inv-item-name">${escapeHtml(item.name)}</div>
                ${item.onSale ? '<div class="sell-badge">💰 On sale: ' + item.sellPrice + ' TON</div>' : '<div class="sell-badge">Not listed</div>'}
                <div class="rarity-badge rarity-${item.rarity?.toLowerCase() || 'common'}">${item.rarity || 'Common'}</div>
            </div>
        `).join('');
    }

    async function loadOrders() {
        try {
            const response = await fetch('/api/exchange/orders');
            const data = await response.json();
            if (data.success) {
                ordersData = data.orders;
                renderOrders();
            }
        } catch (e) {
            console.error('Orders error:', e);
            ordersData = [];
            renderOrders();
        }
    }

    function renderOrders() {
        const container = document.getElementById('ordersList');
        if (!ordersData.length) {
            container.innerHTML = '<div class="empty-state">🔄 No exchange orders yet<br>Create one to start trading!</div>';
            return;
        }
        container.innerHTML = ordersData.map(order => `
            <div class="order-card">
                <div class="order-header">
                    <span class="order-user">👤 ${escapeHtml(order.userName)}</span>
                    <span class="order-status">${order.status === 'open' ? '🟢 Open' : '🔴 Closed'}</span>
                </div>
                <div class="order-items">
                    <div class="order-item">
                        🎁 ${escapeHtml(order.offerGiftName)}
                    </div>
                    <div class="order-arrow">→</div>
                    <div class="order-item">
                        🎁 ${escapeHtml(order.wantGiftName)}
                    </div>
                </div>
                ${order.status === 'open' && order.userId !== currentUser?.id ? `
                    <div class="order-actions">
                        <button class="btn-sm btn-primary" onclick="acceptExchange(${order.id})">Accept Exchange</button>
                    </div>
                ` : ''}
            </div>
        `).join('');
    }

    function openBuyModal(giftId) {
        const gift = giftsData.find(g => g.id == giftId);
        if (!gift) return;

        document.getElementById('buyModalTitle').textContent = gift.name;
        document.getElementById('buyModalImage').innerHTML = gift.image || '🎁';
        document.getElementById('buyModalPrice').textContent = '💰 ' + gift.price + ' TON';

        const confirmBtn = document.getElementById('confirmBuyBtn');
        confirmBtn.onclick = () => buyGift(giftId);

        openModal('buyModal');
    }

    async function buyGift(giftId) {
        if (!currentUser) {
            showToast('Please connect wallet first', 'error');
            return;
        }

        const gift = giftsData.find(g => g.id == giftId);
        if (!gift) return;

        if (currentUser.balance < gift.price) {
            showToast('Insufficient balance', 'error');
            return;
        }

        showToast(`✅ Purchased ${gift.name} successfully!`, 'success');
        closeModal('buyModal');
        await loadUserProfile();
        await loadInventory();
        sendToBot('buy_gift', { giftId: giftId });
    }

    function openSellModal(inventoryId) {
        const item = inventoryData.find(i => i.id == inventoryId);
        if (!item) return;

        document.getElementById('sellModalImage').innerHTML = item.image || '🎁';
        document.getElementById('sellModalPrice').innerHTML = item.onSale ? `Current price: ${item.sellPrice} TON` : 'Set your price';

        const confirmBtn = document.getElementById('confirmSellBtn');
        confirmBtn.onclick = () => listForSale(inventoryId);

        openModal('sellModal');
    }

    async function listForSale(inventoryId) {
        const price = parseFloat(document.getElementById('sellPrice').value);
        if (isNaN(price) || price <= 0) {
            showToast('Please enter a valid price', 'error');
            return;
        }

        showToast('✅ Item listed for sale', 'success');
        closeModal('sellModal');
        await loadInventory();
        sendToBot('sell_gift', { inventoryId: inventoryId, price: price });
    }

    function openCreateExchangeModal() {
        if (!inventoryData.length) {
            showToast('You have no gifts to exchange', 'error');
            return;
        }

        const offerSelect = document.getElementById('offerGiftSelect');
        const wantSelect = document.getElementById('wantGiftSelect');

        const availableGifts = inventoryData.filter(i => !i.onSale);
        if (availableGifts.length === 0) {
            showToast('You have no available gifts for exchange', 'error');
            return;
        }

        offerSelect.innerHTML = '<option value="">Select your gift</option>' +
            availableGifts.map(i => `<option value="${i.id}">🎁 ${escapeHtml(i.name)}</option>`).join('');

        wantSelect.innerHTML = '<option value="">Select desired gift</option>' +
            giftsData.map(g => `<option value="${g.id}">🎁 ${escapeHtml(g.name)} (${g.price} TON)</option>`).join('');

        openModal('exchangeModal');
    }

    async function createExchangeOrder() {
        const offerId = document.getElementById('offerGiftSelect').value;
        const wantId = document.getElementById('wantGiftSelect').value;

        if (!offerId || !wantId) {
            showToast('Please select both gifts', 'error');
            return;
        }

        showToast('✅ Exchange order created', 'success');
        closeModal('exchangeModal');
        await loadOrders();
        await loadInventory();
        sendToBot('create_exchange', { offerId: offerId, wantId: wantId });
    }

    async function acceptExchange(orderId) {
        showToast('🎉 Exchange completed successfully!', 'success');
        await loadOrders();
        await loadInventory();
        await loadUserProfile();
        sendToBot('accept_exchange', { orderId: orderId });
    }

    function openDepositModal() {
        document.getElementById('tonModalTitle').textContent = '💎 Deposit TON';
        const confirmBtn = document.getElementById('confirmTonBtn');
        confirmBtn.onclick = depositTON;
        openModal('tonModal');
    }

    function openWithdrawModal() {
        document.getElementById('tonModalTitle').textContent = '💸 Withdraw TON';
        const confirmBtn = document.getElementById('confirmTonBtn');
        confirmBtn.onclick = withdrawTON;
        openModal('tonModal');
    }

    async function depositTON() {
        const amount = parseFloat(document.getElementById('tonAmount').value);
        if (isNaN(amount) || amount <= 0) {
            showToast('Please enter a valid amount', 'error');
            return;
        }

        showToast('💎 Deposit feature coming soon!', 'info');
        closeModal('tonModal');
        sendToBot('deposit', { amount: amount });
    }

    async function withdrawTON() {
        const amount = parseFloat(document.getElementById('tonAmount').value);
        if (isNaN(amount) || amount <= 0) {
            showToast('Please enter a valid amount', 'error');
            return;
        }

        if (!currentUser || currentUser.balance < amount) {
            showToast('Insufficient balance', 'error');
            return;
        }

        showToast('✅ Withdrawal processed', 'success');
        closeModal('tonModal');
        await loadUserProfile();
        sendToBot('withdraw', { amount: amount });
    }

    // TON Connect
    async function initTonConnect() {
        try {
            if (typeof TON_CONNECT_UI !== 'undefined') {
                tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                    manifestUrl: 'https://raw.githubusercontent.com/ton-connect/manifest/main/manifest.json',
                    buttonRootId: null
                });

                if (tonConnectUI?.wallet) {
                    await connectWalletToBackend(tonConnectUI.wallet.account.address);
                }

                if (tonConnectUI) {
                    tonConnectUI.onStatusChange(async wallet => {
                        if (wallet) {
                            await connectWalletToBackend(wallet.account.address);
                        }
                    });
                }
            }
        } catch (e) {
            console.error('TON Connect error:', e);
        }
    }

    async function connectWallet() {
        if (!tonConnectUI) {
            showToast('TON Connect not initialized', 'error');
            return;
        }
        try {
            await tonConnectUI.connectWallet();
        } catch (e) {
            showToast('Failed to connect wallet', 'error');
        }
    }

    async function connectWalletToBackend(walletAddress) {
        await sendToBot('connect_wallet', { walletAddress });
        showToast('Wallet connected! 💎', 'success');
        await loadUserProfile();
    }

    function updateWalletUI(address) {
        const shortAddr = address.slice(0, 6) + '...' + address.slice(-4);
        document.getElementById('walletAddress').textContent = shortAddr;
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('marketTab').style.display = tab === 'market' ? 'block' : 'none';
        document.getElementById('inventoryTab').style.display = tab === 'inventory' ? 'block' : 'none';
        document.getElementById('exchangeTab').style.display = tab === 'exchange' ? 'block' : 'none';

        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');

        if (tab === 'inventory') loadInventory();
        if (tab === 'exchange') loadOrders();
    }

    function openModal(modalId) {
        document.getElementById(modalId).classList.add('active');
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event Listeners
    document.getElementById('walletBtn').onclick = connectWallet;
    document.getElementById('depositBtn').onclick = openDepositModal;
    document.getElementById('withdrawBtn').onclick = openWithdrawModal;
    document.getElementById('createOrderBtn').onclick = openCreateExchangeModal;
    document.getElementById('confirmExchangeBtn').onclick = createExchangeOrder;

    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => switchTab(tab.dataset.tab);
    });

    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = (e) => {
            e.preventDefault();
            const page = item.dataset.page;
            if (page === 'market') switchTab('market');
            else if (page === 'inventory') switchTab('inventory');
            else if (page === 'exchange') switchTab('exchange');
            else if (page === 'main') switchTab('market');

            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
        };
    });

    // Initialize
    initTonConnect();
    loadUserProfile();
    loadGifts();
    loadInventory();
    loadOrders();

    // Set Telegram theme
    tg.setHeaderColor('bg_color');
    tg.setBackgroundColor('bg_color');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bramls | NFT Обмен</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔄</text></svg>">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --geist-foreground: #000;
      --geist-background: #fff;
      --geist-secondary: #666;
      --geist-tertiary: #999;
      --geist-border: #eaeaea;
      --geist-accent: #000;
      --geist-error: #e00;
      --geist-success: #000;
      --geist-radius: 8px;
      --geist-gap: 16px;
      --geist-font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      --geist-font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
      --geist-shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --geist-shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --geist-shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --geist-foreground: #fff;
        --geist-background: #000;
        --geist-secondary: #888;
        --geist-tertiary: #666;
        --geist-border: #333;
        --geist-accent: #fff;
        --geist-error: #f33;
        --geist-success: #fff;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--geist-font-sans);
      background: var(--geist-background);
      color: var(--geist-foreground);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }
    .app-container {
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      padding: 0 var(--geist-gap);
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    /* Splash */
    .splash-screen {
      position: fixed; inset: 0; background: var(--geist-background);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
      transition: opacity 0.4s;
    }
    .splash-content { text-align: center; }
    .splash-logo { font-size: 64px; margin-bottom: 20px; }
    .splash-title { font-size: 36px; font-weight: 700; letter-spacing: -1px; }
    .splash-subtitle { font-size: 14px; color: var(--geist-secondary); margin-top: 6px; text-transform: uppercase; letter-spacing: 2px; }
    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-bottom: 1px solid var(--geist-border); margin-bottom: 24px;
    }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 28px; }
    .wallet-badge {
      background: var(--geist-background); border: 1px solid var(--geist-border);
      border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 6px; color: var(--geist-secondary);
    }
    /* Profile */
    .profile-card {
      background: var(--geist-background); border: 1px solid var(--geist-border);
      border-radius: 12px; padding: 24px; margin-bottom: 24px; display: flex;
      align-items: center; gap: 16px;
    }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%; background: var(--geist-border);
      display: flex; align-items: center; justify-content: center; font-size: 28px;
      overflow: hidden; flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info { flex: 1; }
    .username { font-weight: 600; font-size: 16px; }
    .telegram-handle { font-size: 13px; color: var(--geist-secondary); }
    .stats-inline { display: flex; gap: 24px; margin-top: 8px; font-size: 13px; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-value { font-weight: 700; }
    .stat-label { color: var(--geist-secondary); font-size: 11px; text-transform: uppercase; }
    /* Balance */
    .balance-card {
      border: 1px solid var(--geist-border); border-radius: 12px; padding: 20px;
      margin-bottom: 24px;
    }
    .balance-label { font-size: 12px; color: var(--geist-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .balance-amount { font-size: 36px; font-weight: 700; display: flex; align-items: baseline; gap: 4px; }
    .balance-amount .currency { font-size: 16px; color: var(--geist-secondary); font-weight: 500; }
    .balance-actions { display: flex; gap: 12px; margin-top: 16px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
      border: 1px solid var(--geist-border); background: var(--geist-background);
      color: var(--geist-foreground); cursor: pointer; transition: all 0.15s;
      text-decoration: none; font-family: inherit;
    }
    .btn:active { background: var(--geist-border); }
    .btn-primary { background: var(--geist-foreground); color: var(--geist-background); border-color: var(--geist-foreground); }
    .btn-primary:active { opacity: 0.8; }
    .btn-full { width: 100%; justify-content: center; }
    /* Filters */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-chip {
      flex: 1; padding: 10px; border: 1px solid var(--geist-border); border-radius: 8px;
      background: var(--geist-background); font-size: 13px; text-align: center;
      cursor: pointer; color: var(--geist-secondary);
    }
    .filter-chip.active { border-color: var(--geist-foreground); color: var(--geist-foreground); }
    .filter-panel, .collection-panel {
      border: 1px solid var(--geist-border); border-radius: 12px; padding: 16px;
      margin-bottom: 16px; display: none; background: var(--geist-background);
    }
    .filter-panel.active, .collection-panel.active { display: block; }
    .filter-group { margin-bottom: 12px; }
    .filter-group label { display: block; font-size: 12px; color: var(--geist-secondary); margin-bottom: 6px; text-transform: uppercase; }
    .filter-group input, .filter-group select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--geist-border);
      border-radius: 8px; background: var(--geist-background); color: var(--geist-foreground);
      font-size: 14px; font-family: inherit;
    }
    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid var(--geist-border); margin-bottom: 20px;
    }
    .tab {
      flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 500;
      cursor: pointer; color: var(--geist-secondary); border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: var(--geist-foreground); border-bottom-color: var(--geist-foreground); }
    /* Grids */
    .gifts-grid, .inventory-grid, .orders-list {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    .gift-card, .inventory-item, .order-card {
      border: 1px solid var(--geist-border); border-radius: 10px; padding: 14px;
      cursor: pointer; transition: all 0.15s; background: var(--geist-background);
      display: flex; flex-direction: column; gap: 8px;
    }
    .gift-card:active, .inventory-item:active { background: var(--geist-border); }
    .gift-image-container {
      width: 100%; aspect-ratio: 1; background: var(--geist-border);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 40px; overflow: hidden;
    }
    .gift-image-container img { width: 100%; height: 100%; object-fit: cover; }
    .gift-name { font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .gift-id { font-size: 11px; color: var(--geist-tertiary); font-weight: 400; }
    .gift-traits { display: flex; flex-wrap: wrap; gap: 4px; }
    .trait-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 4px;
      background: var(--geist-border); color: var(--geist-secondary);
    }
    .gift-stats { font-size: 11px; color: var(--geist-secondary); display: flex; justify-content: space-between; }
    .empty-state { grid-column: span 2; text-align: center; padding: 40px 20px; color: var(--geist-secondary); }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    /* Bottom Nav */
    .bottom-nav {
      position: sticky; bottom: 0; background: var(--geist-background);
      border-top: 1px solid var(--geist-border); display: flex; justify-content: space-around;
      padding: 8px 0; margin-top: auto; max-width: 480px; width: 100%; margin-left: auto; margin-right: auto;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 12px; color: var(--geist-secondary); cursor: pointer; padding: 8px 16px;
      border-radius: 8px; transition: all 0.15s;
    }
    .nav-item.active { color: var(--geist-foreground); background: var(--geist-border); }
    .nav-icon { font-size: 20px; }
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none;
      align-items: center; justify-content: center; z-index: 100; padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--geist-background); border-radius: 16px; width: 100%;
      max-width: 400px; max-height: 85vh; overflow-y: auto; padding: 24px;
      position: relative; border: 1px solid var(--geist-border);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
      border-radius: 50%; border: 1px solid var(--geist-border); background: var(--geist-background);
      cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
      color: var(--geist-secondary);
    }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .modal-image { width: 80px; height: 80px; border-radius: 16px; background: var(--geist-border); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 16px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--geist-border); font-size: 14px; }
    .detail-label { color: var(--geist-secondary); }
    .detail-value { font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .detail-percent { font-size: 12px; color: var(--geist-secondary); }
    .exchange-selector { display: flex; gap: 12px; margin: 16px 0; }
    .exchange-slot { flex: 1; text-align: center; }
    .exchange-slot-btn {
      border: 1px dashed var(--geist-border); border-radius: 12px; padding: 20px 12px;
      cursor: pointer; font-size: 14px; transition: all 0.15s;
    }
    .exchange-slot-btn.selected { border-color: var(--geist-foreground); border-style: solid; background: var(--geist-border); }
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--geist-foreground); color: var(--geist-background);
      padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500;
      z-index: 2000; white-space: nowrap;
    }
    .loading { text-align: center; padding: 40px; color: var(--geist-secondary); }
    .fee-note { font-size: 12px; color: var(--geist-secondary); text-align: center; margin: 12px 0; }
  </style>
</head>
<body>
<div class="splash-screen" id="splashScreen">
  <div class="splash-content">
    <div class="splash-logo">🔄</div>
    <div class="splash-title">Bramls</div>
    <div class="splash-subtitle">NFT Exchange</div>
  </div>
</div>

<div class="app-container" id="appContainer" style="display: none;">
  <div class="header">
    <div class="logo"><span class="logo-icon">◈</span> Bramls</div>
    <div class="wallet-badge" id="walletBtn"><span>◈</span> <span id="walletLabel">TON</span></div>
  </div>

  <div class="profile-card" id="profileCard" style="display: none;">
    <div class="avatar" id="userAvatar">◈</div>
    <div class="profile-info">
      <div class="username" id="userName">...</div>
      <div class="telegram-handle" id="userHandle">@user</div>
      <div class="stats-inline">
        <div class="stat-item"><span class="stat-value" id="totalGifts">0</span><span class="stat-label">Gifts</span></div>
        <div class="stat-item"><span class="stat-value" id="totalExchanges">0</span><span class="stat-label">Trades</span></div>
      </div>
    </div>
  </div>

  <div class="balance-card">
    <div class="balance-label">Balance</div>
    <div class="balance-amount"><span id="tonBalance">0.00</span><span class="currency">TON</span></div>
    <div class="balance-actions">
      <button class="btn" id="depositBtn">Deposit</button>
      <button class="btn" id="withdrawBtn">Withdraw</button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-chip" id="collectionToggleBtn">Collections</button>
    <button class="filter-chip" id="filterToggleBtn">Filters</button>
  </div>

  <div class="collection-panel" id="collectionPanel">
    <div class="filter-group">
      <label>Collection</label>
      <select id="collectionSelect"><option value="">All Collections</option></select>
    </div>
    <button class="btn btn-primary btn-full" id="applyCollectionBtn" style="margin-top: 8px;">Apply</button>
  </div>

  <div class="filter-panel" id="filterPanel">
    <div class="filter-group"><label>Gift</label><input type="text" id="filterGiftName" placeholder="Gift name"></div>
    <div class="filter-group"><label>Model</label><input type="text" id="filterModel" placeholder="e.g. Ramune"></div>
    <div class="filter-group"><label>Background</label><input type="text" id="filterBackground" placeholder="e.g. Onyx Black"></div>
    <div class="filter-group"><label>Pattern</label><input type="text" id="filterPattern" placeholder="e.g. Illuminati"></div>
    <button class="btn btn-primary btn-full" id="applyFiltersBtn" style="margin-top: 8px;">Apply Filters</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="market">Market</div>
    <div class="tab" data-tab="inventory">Inventory</div>
    <div class="tab" data-tab="exchange">Exchange</div>
  </div>

  <div id="marketTab"><div id="giftsGrid" class="gifts-grid"><div class="loading">Loading...</div></div></div>
  <div id="inventoryTab" style="display: none;"><div id="inventoryGrid" class="inventory-grid"><div class="loading">Loading...</div></div></div>
  <div id="exchangeTab" style="display: none;">
    <div class="exchange-selector">
      <div class="exchange-slot">
        <div style="font-size: 11px; color: var(--geist-secondary); margin-bottom: 8px;">YOUR GIFT</div>
        <div class="exchange-slot-btn" id="selectOfferBtn">
          <div>+</div>
          <div style="font-size: 12px; font-weight: 500;" id="selectedOfferName">Select</div>
          <div style="font-size: 10px; color: var(--geist-secondary);" id="selectedOfferDetails"></div>
        </div>
      </div>
      <div class="exchange-slot">
        <div style="font-size: 11px; color: var(--geist-secondary); margin-bottom: 8px;">WANTED</div>
        <div class="exchange-slot-btn" id="selectWantBtn">
          <div>+</div>
          <div style="font-size: 12px; font-weight: 500;" id="selectedWantName">Select</div>
          <div style="font-size: 10px; color: var(--geist-secondary);" id="selectedWantDetails"></div>
        </div>
      </div>
    </div>
    <div class="fee-note">Commission: 0.1 TON per exchange</div>
    <button class="btn btn-primary btn-full" id="createOrderBtn">Create Exchange Order</button>

    <div style="display: flex; gap: 8px; margin: 20px 0;">
      <button class="btn" data-exchange-tab="open" style="flex:1; text-align:center;" id="openOrdersTab">Open Orders</button>
      <button class="btn" data-exchange-tab="my" style="flex:1; text-align:center;" id="myOrdersTab">My Orders</button>
    </div>
    <div id="ordersList" class="orders-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" data-page="market"><span class="nav-icon">◈</span><span>Market</span></div>
  <div class="nav-item" data-page="inventory"><span class="nav-icon">◈</span><span>Inventory</span></div>
  <div class="nav-item" data-page="exchange"><span class="nav-icon">◈</span><span>Exchange</span></div>
</nav>

<div class="modal-overlay" id="giftModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('giftModal')">✕</button>
    <div class="modal-title" id="giftModalTitle"></div>
    <div class="modal-image" id="giftModalImage"></div>
    <div id="giftModalDetails"></div>
    <button class="btn btn-primary btn-full" onclick="closeModal('giftModal')" style="margin-top: 16px;">Close</button>
  </div>
</div>

<div class="modal-overlay" id="giftSelectorModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('giftSelectorModal')">✕</button>
    <div class="modal-title" id="giftSelectorTitle">Select Gift</div>
    <div id="giftSelectorFilters"></div>
    <div id="giftSelectorGrid" class="gifts-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="tonModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('tonModal')">✕</button>
    <div class="modal-title">TON</div>
    <div class="filter-group"><label>Amount</label><input type="number" id="tonAmount" placeholder="0.00" step="0.1"></div>
    <div style="display: flex; gap: 12px; margin-top: 16px;">
      <button class="btn" onclick="closeModal('tonModal')">Cancel</button>
      <button class="btn btn-primary" id="confirmTonBtn">Confirm</button>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  let currentUser = null;
  let currentUserId = tg.initDataUnsafe?.user?.id || null;
  let allGifts = [];
  let inventory = [];
  let openOrders = [];
  let myOrders = [];
  let currentTab = 'market';
  let selectedOfferGift = null;
  let selectedWantGift = null;
  let exchangeTab = 'open';
  let collections = [];
  let filterOptions = { models: [], backgrounds: [], patterns: [] };

  setTimeout(() => {
    document.getElementById('splashScreen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splashScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'flex';
    }, 400);
  }, 1500);

  function apiCall(action, data = {}) {
    return tg.sendData(JSON.stringify({ action, data })).then(() => {
      return new Promise(resolve => {
        tg.onEvent('mainButtonClicked', () => {});
        setTimeout(() => resolve({ success: false, error: 'sync' }), 500);
      });
    }).catch(() => ({ success: false, error: 'WebApp API' }));
  }

  async function fetchData(action, payload = {}) {
    try {
      const res = await tg.sendData(JSON.stringify({ action, data: payload }));
      return { success: true };
    } catch(e) {
      return { success: false };
    }
  }

  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
  function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

  function renderGifts() {
    const container = document.getElementById('giftsGrid');
    if (!allGifts.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">◈</div><div>No gifts found</div><div style="font-size:12px;color:var(--geist-tertiary);margin-top:4px;">Parser is collecting data...</div></div>';
      return;
    }
    container.innerHTML = allGifts.map(g => `
      <div class="gift-card" onclick="openGiftModal(${g.id})">
        <div class="gift-image-container"><img src="${escapeHtml(g.imageUrl || g.previewUrl)}" alt="${escapeHtml(g.name)}" onerror="this.parentElement.innerHTML='◈'" style="width:100%;height:100%;object-fit:cover;"></div>
        <div class="gift-name"><span>${escapeHtml(g.name)}</span><span class="gift-id">#${g.giftId}</span></div>
        <div class="gift-traits">
          ${g.model ? `<span class="trait-badge">${escapeHtml(g.model)}</span>` : ''}
          ${g.background ? `<span class="trait-badge">${escapeHtml(g.background)}</span>` : ''}
          ${g.pattern ? `<span class="trait-badge">${escapeHtml(g.pattern)}</span>` : ''}
        </div>
        ${g.issuedCount ? `<div class="gift-stats"><span>Issued: ${g.issuedCount}/${g.totalCount}</span></div>` : ''}
      </div>
    `).join('');
  }

  function renderInventory() {
    const container = document.getElementById('inventoryGrid');
    if (!inventory.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">◈</div><div>Inventory is empty</div><div style="font-size:12px;color:var(--geist-tertiary);margin-top:4px;">Complete exchanges to collect gifts</div></div>';
      return;
    }
    container.innerHTML = inventory.map(i => `
      <div class="inventory-item">
        <div class="gift-image-container"><img src="${escapeHtml(i.imageUrl)}" alt="${escapeHtml(i.name)}" onerror="this.parentElement.innerHTML='◈'" style="width:100%;height:100%;object-fit:cover;"></div>
        <div class="gift-name">${escapeHtml(i.name)}</div>
        <div class="gift-traits">
          ${i.model ? `<span class="trait-badge">${escapeHtml(i.model)}</span>` : ''}
          ${i.background ? `<span class="trait-badge">${escapeHtml(i.background)}</span>` : ''}
          ${i.pattern ? `<span class="trait-badge">${escapeHtml(i.pattern)}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderOrders() {
    const container = document.getElementById('ordersList');
    const orders = exchangeTab === 'open' ? openOrders : myOrders;
    if (!orders.length) {
      container.innerHTML = '<div class="empty-state"><div>No orders</div></div>';
      return;
    }
    container.innerHTML = orders.map(o => `
      <div class="order-card" style="grid-column: span 2;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;">
          <span>${escapeHtml(o.userName)}</span>
          <span style="color:var(--geist-secondary)">${o.status}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
          <div style="flex:1;text-align:center;"><div style="font-weight:600;">${escapeHtml(o.offerGiftName)}</div><div style="font-size:11px;color:var(--geist-secondary);">${escapeHtml(o.offerModel||'')} ${escapeHtml(o.offerBackground||'')} ${escapeHtml(o.offerPattern||'')}</div></div>
          <div>→</div>
          <div style="flex:1;text-align:center;"><div style="font-weight:600;">${escapeHtml(o.wantGiftName)}</div></div>
        </div>
        ${exchangeTab === 'open' && o.userId !== currentUserId ? `<button class="btn btn-primary btn-full" onclick="acceptExchange(${o.id})">Accept (0.1 TON)</button>` : ''}
      </div>
    `).join('');
  }

  function openGiftModal(giftId) {
    const gift = allGifts.find(g => g.id == giftId) || inventory.find(i => i.nftId == giftId);
    if (!gift) return;
    document.getElementById('giftModalTitle').textContent = `${gift.name} #${gift.giftId || ''}`;
    document.getElementById('giftModalImage').innerHTML = `<img src="${escapeHtml(gift.imageUrl || gift.previewUrl)}" alt="${escapeHtml(gift.name)}" style="width:80px;height:80px;object-fit:cover;border-radius:16px;" onerror="this.outerHTML='◈'">`;
    let details = '';
    if (gift.owner) details += `<div class="detail-row"><span class="detail-label">Owner</span><span class="detail-value">${escapeHtml(gift.owner)}${gift.ownerUsername ? ' @'+escapeHtml(gift.ownerUsername) : ''}</span></div>`;
    if (gift.issuedCount) details += `<div class="detail-row"><span class="detail-label">Issued</span><span class="detail-value">${gift.issuedCount} / ${gift.totalCount}</span></div>`;
    if (gift.model) details += `<div class="detail-row"><span class="detail-label">Model</span><span class="detail-value">${escapeHtml(gift.model)} ${gift.modelPercent ? '<span class="detail-percent">'+gift.modelPercent+'%</span>' : ''}</span></div>`;
    if (gift.background) details += `<div class="detail-row"><span class="detail-label">Background</span><span class="detail-value">${escapeHtml(gift.background)} ${gift.backgroundPercent ? '<span class="detail-percent">'+gift.backgroundPercent+'%</span>' : ''}</span></div>`;
    if (gift.pattern) details += `<div class="detail-row"><span class="detail-label">Pattern</span><span class="detail-value">${escapeHtml(gift.pattern)} ${gift.patternPercent ? '<span class="detail-percent">'+gift.patternPercent+'%</span>' : ''}</span></div>`;
    if (gift.characteristics) {
      Object.entries(gift.characteristics).forEach(([k,v]) => {
        if (!['Модель','Фон','Символ','Узор'].includes(k)) details += `<div class="detail-row"><span class="detail-label">${escapeHtml(k)}</span><span class="detail-value">${escapeHtml(v)}</span></div>`;
      });
    }
    document.getElementById('giftModalDetails').innerHTML = details || '<div style="color:var(--geist-secondary);">No details</div>';
    openModal('giftModal');
  }

  function loadAll() {
    loadUserProfile();
    loadGifts();
    loadInventory();
    loadOrders();
    loadCollections();
    loadFilterOptions();
  }

  async function loadUserProfile() {
    document.getElementById('userName').textContent = tg.initDataUnsafe?.user?.first_name || 'User';
    document.getElementById('userHandle').textContent = '@' + (tg.initDataUnsafe?.user?.username || 'user');
    document.getElementById('profileCard').style.display = 'flex';
    document.getElementById('tonBalance').textContent = '0.00';
    document.getElementById('totalGifts').textContent = '0';
  }

  async function loadGifts(filters = {}) {
    allGifts = [];
    renderGifts();
    tg.sendData(JSON.stringify({ action: 'filter_gifts', data: filters }));
  }

  async function loadInventory() {
    inventory = [];
    renderInventory();
    tg.sendData(JSON.stringify({ action: 'get_inventory', data: {} }));
  }

  async function loadOrders() {
    openOrders = []; myOrders = []; renderOrders();
    tg.sendData(JSON.stringify({ action: 'get_orders', data: {} }));
  }

  async function loadCollections() {
    tg.sendData(JSON.stringify({ action: 'get_collections', data: {} }));
  }

  async function loadFilterOptions() {
    tg.sendData(JSON.stringify({ action: 'get_filter_options', data: {} }));
  }

  function applyFilters() {
    const filters = {
      collectionId: document.getElementById('collectionSelect').value ? parseInt(document.getElementById('collectionSelect').value) : null,
      giftName: document.getElementById('filterGiftName').value || null,
      model: document.getElementById('filterModel').value || null,
      background: document.getElementById('filterBackground').value || null,
      pattern: document.getElementById('filterPattern').value || null
    };
    loadGifts(filters);
    toggleFilters();
    toggleCollections();
  }

  function toggleFilters() { document.getElementById('filterPanel').classList.toggle('active'); document.getElementById('collectionPanel').classList.remove('active'); }
  function toggleCollections() { document.getElementById('collectionPanel').classList.toggle('active'); document.getElementById('filterPanel').classList.remove('active'); }
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('marketTab').style.display = tab === 'market' ? 'block' : 'none';
    document.getElementById('inventoryTab').style.display = tab === 'inventory' ? 'block' : 'none';
    document.getElementById('exchangeTab').style.display = tab === 'exchange' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${tab}"]`).classList.add('active');
    if (tab === 'inventory') loadInventory();
    if (tab === 'exchange') loadOrders();
  }
  function switchExchangeTab(tab) { exchangeTab = tab; document.querySelectorAll('[data-exchange-tab]').forEach(b => b.style.background = ''); document.querySelector(`[data-exchange-tab="${tab}"]`).style.background = 'var(--geist-border)'; renderOrders(); }

  document.getElementById('walletBtn').onclick = () => showToast('Wallet: 0xf1...3b3a');
  document.getElementById('depositBtn').onclick = () => { document.getElementById('tonModal').classList.add('active'); document.getElementById('confirmTonBtn').onclick = () => { showToast('Demo mode'); closeModal('tonModal'); }; };
  document.getElementById('withdrawBtn').onclick = () => { document.getElementById('tonModal').classList.add('active'); document.getElementById('confirmTonBtn').onclick = () => { showToast('Demo mode'); closeModal('tonModal'); }; };
  document.getElementById('createOrderBtn').onclick = () => { if (!selectedOfferGift || !selectedWantGift) { showToast('Select both gifts'); return; } tg.sendData(JSON.stringify({ action: 'create_exchange', data: { offerId: selectedOfferGift.nftId, wantId: selectedWantGift.id } })); };
  document.getElementById('selectOfferBtn').onclick = () => openGiftSelector('offer');
  document.getElementById('selectWantBtn').onclick = () => openGiftSelector('want');
  document.getElementById('filterToggleBtn').onclick = toggleFilters;
  document.getElementById('collectionToggleBtn').onclick = toggleCollections;
  document.getElementById('applyFiltersBtn').onclick = applyFilters;
  document.getElementById('applyCollectionBtn').onclick = applyFilters;
  document.getElementById('openOrdersTab').onclick = () => switchExchangeTab('open');
  document.getElementById('myOrdersTab').onclick = () => switchExchangeTab('my');
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => switchTab(t.dataset.tab));
  document.querySelectorAll('.nav-item').forEach(i => i.onclick = () => switchTab(i.dataset.page));

  function openGiftSelector(type) {
    document.getElementById('giftSelectorTitle').textContent = type === 'offer' ? 'Select Your Gift' : 'Select Wanted Gift';
    const items = type === 'offer' ? inventory : allGifts;
    const grid = document.getElementById('giftSelectorGrid');
    grid.innerHTML = items.length ? items.slice(0, 40).map(i => `
      <div class="gift-card" onclick="selectGift('${type}', ${type === 'offer' ? i.nftId : i.id})">
        <div class="gift-image-container"><img src="${escapeHtml(i.imageUrl)}" onerror="this.parentElement.innerHTML='◈'" style="width:100%;height:100%;object-fit:cover;"></div>
        <div class="gift-name">${escapeHtml(i.name)}</div>
      </div>
    `).join('') : '<div class="empty-state">No gifts available</div>';
    openModal('giftSelectorModal');
  }

  function selectGift(type, id) {
    const gift = type === 'offer' ? inventory.find(i => i.nftId == id) : allGifts.find(g => g.id == id);
    if (!gift) return;
    if (type === 'offer') {
      selectedOfferGift = gift;
      document.getElementById('selectedOfferName').textContent = gift.name;
      document.getElementById('selectedOfferDetails').textContent = [gift.model, gift.background, gift.pattern].filter(Boolean).join(' ');
      document.getElementById('selectOfferBtn').classList.add('selected');
    } else {
      selectedWantGift = gift;
      document.getElementById('selectedWantName').textContent = `${gift.name} #${gift.giftId}`;
      document.getElementById('selectedWantDetails').textContent = [gift.model, gift.background, gift.pattern].filter(Boolean).join(' ');
      document.getElementById('selectWantBtn').classList.add('selected');
    }
    closeModal('giftSelectorModal');
  }

  function acceptExchange(orderId) {
    tg.sendData(JSON.stringify({ action: 'accept_exchange', data: { orderId } }));
  }

  loadAll();
</script>
</body>
</html>
